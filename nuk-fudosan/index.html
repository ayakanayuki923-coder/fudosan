<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Ver 2.0 · Property Note</title>
<style>
:root{
  --green:#2e7d32;--green-light:#e8f5e9;--green-dark:#1b5e20;
  --red:#c62828;--red-light:#ffebee;
  --gray:#f5f5f5;--gray2:#e0e0e0;--gray3:#9e9e9e;--gray4:#616161;
  --white:#fff;--black:#212121;
  --sidebar-w:240px;--tab-h:56px;
  --radius:10px;--shadow:0 2px 8px rgba(0,0,0,.1);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;background:#fafafa;color:var(--black);overscroll-behavior:contain;-webkit-text-size-adjust:100%;}
button{font-family:inherit;cursor:pointer;border:none;background:none;font-size:14px;}
input,select,textarea{font-family:inherit;font-size:14px;border:1px solid var(--gray2);border-radius:6px;padding:8px 10px;width:100%;background:var(--white);}
textarea{resize:vertical;min-height:80px;}
select{appearance:auto;}

/* Toast */
#toast{position:fixed;bottom:calc(var(--tab-h) + 16px);left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:8px;color:#fff;font-size:14px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;}
#toast.success{background:var(--green);}
#toast.error{background:var(--red);}

/* Sidebar - PC */
.sidebar{display:none;position:fixed;left:0;top:0;width:var(--sidebar-w);height:100vh;background:var(--white);border-right:1px solid var(--gray2);padding:20px 0;z-index:100;flex-direction:column;}
.sidebar .logo{font-size:18px;font-weight:700;color:var(--green);padding:0 20px 20px;border-bottom:1px solid var(--gray2);}
.sidebar nav{flex:1;padding:10px 0;}
.sidebar nav a{display:flex;align-items:center;gap:10px;padding:10px 20px;color:var(--gray4);text-decoration:none;font-size:14px;font-weight:500;transition:background .2s;}
.sidebar nav a:hover,.sidebar nav a.active{background:var(--green-light);color:var(--green);}
.sidebar .ver{padding:10px 20px;font-size:11px;color:var(--gray3);}

/* Top bar - Mobile */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--white);border-bottom:1px solid var(--gray2);position:sticky;top:0;z-index:90;}
.topbar h1{font-size:16px;font-weight:700;color:var(--green);}
.topbar .ver{font-size:11px;color:var(--gray3);}

/* Tab bar - Mobile */
.tabbar{display:flex;position:fixed;bottom:0;left:0;right:0;height:var(--tab-h);background:var(--white);border-top:1px solid var(--gray2);z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.tabbar a{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--gray3);text-decoration:none;font-size:10px;font-weight:500;transition:color .2s;}
.tabbar a.active{color:var(--green);}
.tabbar a .icon{font-size:20px;}

/* Main content */
.main{padding:16px;padding-bottom:150px;}
@media(min-width:900px){
  .sidebar{display:flex;}
  .topbar{display:none;}
  .tabbar{display:none;}
  .main{margin-left:var(--sidebar-w);padding:24px 32px 40px;}
}

/* Page visibility */
.page{display:none;}
.page.active{display:block;}

/* Cards */
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:12px;}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.card-title{font-size:15px;font-weight:700;}
.card-sub{font-size:12px;color:var(--gray3);margin-top:2px;}
.card-body{font-size:13px;color:var(--gray4);line-height:1.6;}

/* Status badge */
.status-badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;white-space:nowrap;}
.status-badge.取得{background:#e3f2fd;color:#1565c0;}
.status-badge.運用{background:#e8f5e9;color:#2e7d32;}
.status-badge.出口{background:#fff3e0;color:#e65100;}
.status-badge.離脱{background:#fce4ec;color:#c62828;}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:14px;font-weight:600;transition:all .2s;}
.btn-primary{background:var(--green);color:#fff;}
.btn-primary:hover{background:var(--green-dark);}
.btn-secondary{background:var(--gray);color:var(--gray4);border:1px solid var(--gray2);}
.btn-danger{background:var(--red-light);color:var(--red);}
.btn-sm{padding:5px 10px;font-size:12px;}
.action-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:flex-end;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:var(--white);border-radius:16px 16px 0 0;width:100%;max-width:600px;max-height:85vh;overflow-y:auto;padding:20px 16px 32px;animation:slideUp .3s;}
@media(min-width:900px){.modal{border-radius:16px;margin:auto;max-height:80vh;}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--gray2);}
.modal-header h2{font-size:16px;font-weight:700;}
.modal-close{font-size:24px;color:var(--gray3);padding:4px 8px;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--gray4);margin-bottom:4px;}
.form-section{margin:16px 0 8px;padding:8px 0 4px;border-bottom:1px solid var(--gray2);font-size:13px;font-weight:700;color:var(--green);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* Property detail */
.detail-tabs{display:flex;gap:0;border-bottom:2px solid var(--gray2);margin-bottom:16px;overflow-x:auto;}
.detail-tab{padding:8px 14px;font-size:13px;font-weight:600;color:var(--gray3);border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;cursor:pointer;}
.detail-tab.active{color:var(--green);border-bottom-color:var(--green);}
.detail-pane{display:none;}
.detail-pane.active{display:block;}

/* Field display */
.field-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0f0f0;font-size:13px;}
.field-label{color:var(--gray3);min-width:100px;}
.field-value{color:var(--black);font-weight:500;text-align:right;}

/* Filter */
.filter-bar{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;}
.filter-chip{padding:5px 12px;border-radius:16px;font-size:12px;font-weight:500;background:var(--gray);color:var(--gray4);white-space:nowrap;border:1px solid var(--gray2);}
.filter-chip.active{background:var(--green-light);color:var(--green);border-color:var(--green);}

/* Yield calculator */
.calc-section{margin-bottom:16px;}
.calc-section h3{font-size:13px;font-weight:700;color:var(--green);margin-bottom:8px;padding:6px 0;border-bottom:1px solid var(--gray2);}
.calc-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.calc-row input[type=text]{flex:1;}
.calc-row input[type=number]{width:120px;text-align:right;}
.calc-row .unit{font-size:12px;color:var(--gray3);min-width:30px;}
.calc-row .del-btn{color:var(--red);font-size:18px;padding:0 4px;}
.calc-result{background:var(--green-light);border-radius:var(--radius);padding:16px;margin-top:16px;}
.calc-result .big{font-size:24px;font-weight:700;color:var(--green);}
.calc-result .sub{font-size:13px;color:var(--gray4);margin-top:4px;}
.pattern-tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;}
.pattern-tab{padding:5px 12px;border-radius:16px;font-size:12px;font-weight:600;background:var(--gray);color:var(--gray4);border:1px solid var(--gray2);}
.pattern-tab.active{background:var(--green);color:#fff;border-color:var(--green);}

/* Checkbox list */
.checkbox-list{max-height:120px;overflow-y:auto;border:1px solid var(--gray2);border-radius:6px;padding:6px;}
.checkbox-list label{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:13px;cursor:pointer;}

/* Empty state */
.empty{text-align:center;padding:40px 20px;color:var(--gray3);}
.empty .icon{font-size:40px;margin-bottom:8px;}
</style>
</head>
<body>

<!-- Sidebar (PC) -->
<aside class="sidebar">
  <div class="logo">Property Note</div>
  <nav>
    <a href="#" data-page="home" class="active"><span>🏠</span> Home</a>
    <a href="#" data-page="property"><span>🏢</span> 物件</a>
    <a href="#" data-page="memo"><span>📝</span> Memo</a>
    <a href="#" data-page="learn"><span>📚</span> Learn</a>
    <a href="#" data-page="calendar"><span>📅</span> カレンダー</a>
  </nav>
  <div class="ver">Ver 2.0</div>
</aside>

<!-- Top bar (Mobile) -->
<header class="topbar">
  <h1 id="topbar-title">Property Note</h1>
  <span class="ver">Ver 2.0</span>
</header>

<!-- Toast -->
<div id="toast"></div>

<!-- ===== PAGES ===== -->
<div class="main">

<!-- HOME -->
<div class="page active" id="page-home">
  <div class="action-bar">
    <button class="btn btn-primary" onclick="openMemoModal()">+ Memo</button>
    <button class="btn btn-primary" onclick="openPropertyModal()">+ 物件</button>
    <button class="btn btn-secondary" onclick="openCalcModal()">💴 利回り電卓</button>
  </div>
  <h3 style="font-size:14px;margin-bottom:10px;">🏠 物件</h3>
  <div id="home-property-list"></div>
  <h3 style="font-size:14px;margin:16px 0 10px;">📝 最近のMemo</h3>
  <div id="home-memo-list"></div>
</div>

<!-- PROPERTY LIST -->
<div class="page" id="page-property">
  <div class="action-bar">
    <button class="btn btn-primary" onclick="openPropertyModal()">+ 物件追加</button>
  </div>
  <div class="filter-bar" id="property-filter"></div>
  <div id="property-list"></div>
</div>

<!-- PROPERTY DETAIL -->
<div class="page" id="page-property-detail">
  <div class="action-bar">
    <button class="btn btn-secondary" onclick="showPage('property')">&larr; 物件一覧</button>
    <button class="btn btn-secondary btn-sm" onclick="editCurrentProperty()">✏ 編集</button>
  </div>
  <div id="property-detail-content"></div>
</div>

<!-- MEMO LIST -->
<div class="page" id="page-memo">
  <div class="action-bar">
    <button class="btn btn-primary" onclick="openMemoModal()">+ Memo追加</button>
  </div>
  <div class="filter-bar" id="memo-filter"></div>
  <div id="memo-list"></div>
</div>

<!-- LEARN (placeholder) -->
<div class="page" id="page-learn">
  <div class="empty"><div class="icon">📚</div>Learn機能は次期バージョンで追加予定</div>
</div>

<!-- CALENDAR (placeholder) -->
<div class="page" id="page-calendar">
  <div class="empty"><div class="icon">📅</div>カレンダー機能は次期バージョンで追加予定</div>
</div>

</div><!-- .main -->

<!-- Tab bar (Mobile) -->
<nav class="tabbar">
  <a href="#" data-page="home" class="active"><span class="icon">🏠</span>Home</a>
  <a href="#" data-page="property"><span class="icon">🏢</span>物件</a>
  <a href="#" data-page="memo"><span class="icon">📝</span>Memo</a>
  <a href="#" data-page="learn"><span class="icon">📚</span>Learn</a>
  <a href="#" data-page="calendar"><span class="icon">📅</span>カレンダー</a>
</nav>

<!-- ===== MODALS ===== -->

<!-- Property Modal -->
<div class="modal-overlay" id="modal-property">
<div class="modal">
  <div class="modal-header">
    <h2 id="property-modal-title">物件追加</h2>
    <button class="modal-close" onclick="closeModal('modal-property')">&times;</button>
  </div>
  <form onsubmit="saveProperty(event)">
    <input type="hidden" id="prop-id">

    <div class="form-section">📍 基本情報</div>
    <div class="form-group"><label>日付</label><input type="text" id="prop-date" placeholder="YYYY-MM-DD"></div>
    <div class="form-group"><label>物件名 *</label><input type="text" id="prop-name" required></div>
    <div class="form-group"><label>住所</label><input type="text" id="prop-location"></div>
    <div class="form-group"><label>Google Maps URL</label><input type="text" id="prop-mapurl"></div>
    <div class="form-row">
      <div class="form-group"><label>種別</label>
        <select id="prop-ptype"><option value="">--</option><option>戸建</option><option>区分マンション</option><option>一棟アパート</option><option>一棟マンション</option><option>土地</option><option>その他</option></select>
      </div>
      <div class="form-group"><label>築年数</label><input type="number" id="prop-age" placeholder="年"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>延床面積 (㎡)</label><input type="number" id="prop-area" step="0.01"></div>
      <div class="form-group"><label>土地面積 (㎡)</label><input type="number" id="prop-land" step="0.01"></div>
    </div>
    <div class="form-group"><label>アクセス</label><input type="text" id="prop-access" placeholder="例: ○○駅 徒歩10分"></div>
    <div class="form-group"><label>掲載URL</label><input type="text" id="prop-listingurl"></div>
    <div class="form-group"><label>ステータス</label>
      <select id="prop-status">
        <optgroup label="取得フェーズ">
          <option>候補発見</option><option>調査中</option><option>内覧予定</option><option>内覧済</option><option>交渉中</option><option>買付済</option><option>契約済</option>
        </optgroup>
        <optgroup label="運用フェーズ">
          <option>修繕中</option><option>募集中</option><option>運用中</option>
        </optgroup>
        <optgroup label="出口フェーズ">
          <option>売却検討中</option><option>売却済</option>
        </optgroup>
        <optgroup label="離脱">
          <option>見送り</option>
        </optgroup>
      </select>
    </div>

    <div class="form-section">📜 法的・行政情報</div>
    <div class="form-group"><label>用途地域</label><input type="text" id="prop-zoning"></div>
    <div class="form-row">
      <div class="form-group"><label>建ぺい率 (%)</label><input type="number" id="prop-coverage" step="0.1"></div>
      <div class="form-group"><label>容積率 (%)</label><input type="number" id="prop-far" step="0.1"></div>
    </div>
    <div class="form-group"><label>接道状況</label><input type="text" id="prop-road"></div>
    <div class="form-group"><label>再建築可否</label>
      <select id="prop-rebuild"><option value="">--</option><option>可</option><option>不可</option><option>要確認</option></select>
    </div>
    <div class="form-group"><label>登記・権利関係メモ</label><textarea id="prop-legal-memo" rows="2"></textarea></div>

    <div class="form-section">💴 収支・数値（見込み）</div>
    <div class="form-row">
      <div class="form-group"><label>購入価格 (万円)</label><input type="number" id="prop-price"></div>
      <div class="form-group"><label>想定家賃 (円/月)</label><input type="number" id="prop-rent"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>近隣相場 (円/月)</label><input type="number" id="prop-market-rent"></div>
      <div class="form-group"><label>修繕費見込 (万円)</label><input type="number" id="prop-repair"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>諸費用見込 (万円)</label><input type="number" id="prop-closing"></div>
      <div class="form-group"><label>自己資金 (万円)</label><input type="number" id="prop-downpayment"></div>
    </div>

    <div class="form-section">🚪 出口戦略</div>
    <div class="form-group"><label>出口方針</label>
      <select id="prop-exit"><option value="">--</option><option>長期保有</option><option>5年以内売却</option><option>10年以内売却</option><option>建替後売却</option><option>未定</option></select>
    </div>
    <div class="form-row">
      <div class="form-group"><label>想定保有期間 (年)</label><input type="number" id="prop-exit-year"></div>
      <div class="form-group"><label>想定売却価格 (万円)</label><input type="number" id="prop-exit-price"></div>
    </div>
    <div class="form-group"><label>出口の根拠メモ</label><textarea id="prop-exit-reason" rows="2"></textarea></div>

    <div class="form-section">📸 写真</div>
    <div class="form-group"><label>アルバムURL (Amazonフォト等)</label><input type="text" id="prop-photo-url"></div>
    <div class="form-group"><label>撮影メモ</label><input type="text" id="prop-photo-memo" placeholder="例: 外観・内装・水回り撮影済み"></div>

    <div id="drop-section" style="display:none;">
      <div class="form-section">❌ 見送り情報</div>
      <div class="form-group"><label>見送り理由</label>
        <select id="prop-drop-reason"><option value="">--</option><option>価格が高い</option><option>利回り不足</option><option>立地が悪い</option><option>修繕費が大きい</option><option>法的リスク</option><option>融資が通らない</option><option>空室リスク</option><option>築古すぎる</option><option>その他</option></select>
      </div>
      <div class="form-group"><label>見送り詳細</label><textarea id="prop-drop-memo" rows="2"></textarea></div>
    </div>

    <div class="form-section">📝 その他</div>
    <div class="form-group"><label>メモ</label><textarea id="prop-memo" rows="3"></textarea></div>

    <div style="margin-top:20px;">
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">保存</button>
    </div>
  </form>
</div>
</div>

<!-- Memo Modal -->
<div class="modal-overlay" id="modal-memo">
<div class="modal">
  <div class="modal-header">
    <h2 id="memo-modal-title">Memo追加</h2>
    <button class="modal-close" onclick="closeModal('modal-memo')">&times;</button>
  </div>
  <form onsubmit="saveMemo(event)">
    <input type="hidden" id="memo-id">
    <div class="form-group"><label>日付</label><input type="text" id="memo-date" placeholder="YYYY-MM-DD"></div>
    <div class="form-group"><label>タイトル *</label><input type="text" id="memo-title" required></div>
    <div class="form-group"><label>カテゴリ</label>
      <select id="memo-category">
        <option value="">--</option>
        <option>物件探し</option><option>現地調査</option><option>相場調査</option><option>法的確認</option>
        <option>交渉・契約</option><option>融資</option><option>修繕・リフォーム</option>
        <option>入居・管理</option><option>収支・税務</option><option>売却</option>
        <option>人脈づくり</option><option>その他</option>
      </select>
    </div>
    <div class="form-group"><label>内容</label><textarea id="memo-content" rows="4"></textarea></div>
    <div class="form-group"><label>URL</label><input type="text" id="memo-url" placeholder="参考URL"></div>
    <div class="form-group"><label>紐づけ物件</label>
      <div class="checkbox-list" id="memo-properties-list"></div>
    </div>
    <div class="form-group"><label>次のアクション</label><input type="text" id="memo-next"></div>
    <div class="form-group"><label>次のアクション予定日</label><input type="text" id="memo-next-due" placeholder="YYYY-MM-DD"></div>
    <div style="margin-top:20px;">
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">保存</button>
    </div>
  </form>
</div>
</div>

<!-- Yield Calculator Modal -->
<div class="modal-overlay" id="modal-calc">
<div class="modal">
  <div class="modal-header">
    <h2>💴 利回り電卓</h2>
    <button class="modal-close" onclick="closeModal('modal-calc')">&times;</button>
  </div>
  <div class="pattern-tabs" id="calc-pattern-tabs"></div>
  <div style="display:flex;gap:6px;margin-bottom:12px;">
    <button class="btn btn-secondary btn-sm" onclick="addPattern()">+ パターン</button>
    <button class="btn btn-secondary btn-sm" onclick="renamePattern()">✏ 名前変更</button>
    <button class="btn btn-danger btn-sm" onclick="deletePattern()">🗑 削除</button>
  </div>
  <div id="calc-body"></div>
</div>
</div>

<!-- Loan Modal -->
<div class="modal-overlay" id="modal-loan">
<div class="modal">
  <div class="modal-header">
    <h2 id="loan-modal-title">融資情報を追加</h2>
    <button class="modal-close" onclick="closeModal('modal-loan')">&times;</button>
  </div>
  <form onsubmit="saveLoan(event)">
    <input type="hidden" id="loan-id">
    <input type="hidden" id="loan-prop-id">
    <div class="form-group"><label>金融機関名 *</label><input type="text" id="loan-bank" required placeholder="例: 日本政策金融公庫"></div>
    <div class="form-row">
      <div class="form-group"><label>借入額 (万円)</label><input type="number" id="loan-amount"></div>
      <div class="form-group"><label>金利 (%)</label><input type="number" id="loan-rate" step="0.01"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>返済期間 (年)</label><input type="number" id="loan-years"></div>
      <div class="form-group"><label>返済方式</label>
        <select id="loan-type"><option>元利均等</option><option>元金均等</option></select>
      </div>
    </div>
    <div class="form-group"><label>月々返済額 (円)</label><input type="number" id="loan-monthly"></div>
    <div class="form-group"><label>融資ステータス</label>
      <select id="loan-status">
        <option>未相談</option><option>相談中</option><option>仮審査中</option><option>仮審査通過</option><option>本審査中</option><option>承認</option><option>否決</option>
      </select>
    </div>
    <div class="form-group"><label>メモ (担当者名・条件交渉等)</label><textarea id="loan-memo" rows="2"></textarea></div>
    <div class="form-group"><label>結果・否決理由</label><textarea id="loan-result" rows="2"></textarea></div>
    <div style="margin-top:20px;">
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">保存</button>
    </div>
  </form>
</div>
</div>


<script>
/* ===== DATA ===== */
const STORAGE_KEY = 'fudosan_note_v2';
const VERSION = '2.0';

let data = {
  property: [], action: [], learning: [], learns: [],
  diary: [], schedules: [], gasUrl: '', gasApiKey: '', gasWritePassword: '',
  calcPatterns: [{ id: genId(), name: 'パターンA', income: [{ name: '家賃収入', value: 0, unit: '月' }], acquisition: [{ name: '物件価格', value: 0, unit: '一時' }], running: [{ name: '管理費', value: 0, unit: '月' }, { name: '修繕積立金', value: 0, unit: '月' }, { name: '固定資産税', value: 0, unit: '年' }], vacancyRate: 10 }]
};

let currentPropertyId = null;
let currentCalcPatternIdx = 0;

function genId() { return String(Date.now()) + '-' + Math.random().toString(36).substr(2, 5); }
function today() { const d = new Date(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
function num(v) { const n = parseFloat(v); return isNaN(n) ? null : n; }
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmtNum(n) { return n != null ? Number(n).toLocaleString() : '-'; }

/* ===== STORAGE ===== */
function loadData() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) {
      const d = JSON.parse(s);
      Object.keys(d).forEach(k => { data[k] = d[k]; });
    }
  } catch(e) { console.error('Load error', e); }
}
function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch(e) { toast('保存エラー: ' + e.message, 'error'); }
}

/* ===== TOAST ===== */
function toast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = (type === 'success' ? '✅ ' : '❌ ') + msg;
  t.className = 'show ' + type;
  setTimeout(() => { t.className = ''; }, 2500);
}

/* ===== NAVIGATION ===== */
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const page = document.getElementById('page-' + name);
  if (page) page.classList.add('active');
  document.querySelectorAll('.sidebar nav a, .tabbar a').forEach(a => {
    a.classList.toggle('active', a.dataset.page === name);
  });
  const titles = { home: 'Property Note', property: '物件', 'property-detail': '物件詳細', memo: 'Memo', learn: 'Learn', calendar: 'カレンダー' };
  document.getElementById('topbar-title').textContent = titles[name] || 'Property Note';
  window.scrollTo(0, 0);
  if (name === 'home') renderHome();
  if (name === 'property') renderPropertyList();
  if (name === 'memo') renderMemoList();
}

document.querySelectorAll('[data-page]').forEach(a => {
  a.addEventListener('click', e => { e.preventDefault(); showPage(a.dataset.page); });
});

/* ===== STATUS HELPERS ===== */
const STATUS_PHASE = {
  '候補発見':'取得','調査中':'取得','内覧予定':'取得','内覧済':'取得','交渉中':'取得','買付済':'取得','契約済':'取得',
  '修繕中':'運用','募集中':'運用','運用中':'運用',
  '売却検討中':'出口','売却済':'出口',
  '見送り':'離脱'
};
function statusBadge(s) { return '<span class="status-badge ' + (STATUS_PHASE[s]||'') + '">' + esc(s) + '</span>'; }

/* ===== PROPERTY ===== */
function openPropertyModal(id) {
  const m = document.getElementById('modal-property');
  const isEdit = !!id;
  document.getElementById('property-modal-title').textContent = isEdit ? '物件編集' : '物件追加';
  const p = isEdit ? data.property.find(x => String(x.id) === String(id)) : null;

  document.getElementById('prop-id').value = isEdit ? p.id : '';
  document.getElementById('prop-date').value = isEdit ? (p.date||'') : today();
  document.getElementById('prop-name').value = p ? p.name : '';
  document.getElementById('prop-location').value = p ? (p.location||'') : '';
  document.getElementById('prop-mapurl').value = p ? (p.mapUrl||'') : '';
  document.getElementById('prop-ptype').value = p ? (p.ptype||'') : '';
  document.getElementById('prop-age').value = p ? (p.age||'') : '';
  document.getElementById('prop-area').value = p ? (p.area||'') : '';
  document.getElementById('prop-land').value = p ? (p.land||'') : '';
  document.getElementById('prop-access').value = p ? (p.access||'') : '';
  document.getElementById('prop-listingurl').value = p ? (p.listingUrl||'') : '';
  document.getElementById('prop-status').value = p ? (p.status||'候補発見') : '候補発見';
  document.getElementById('prop-zoning').value = p ? (p.zoning||'') : '';
  document.getElementById('prop-coverage').value = p ? (p.coverage||'') : '';
  document.getElementById('prop-far').value = p ? (p.far||'') : '';
  document.getElementById('prop-road').value = p ? (p.road||'') : '';
  document.getElementById('prop-rebuild').value = p ? (p.rebuild||'') : '';
  document.getElementById('prop-legal-memo').value = p ? (p.legalMemo||'') : '';
  document.getElementById('prop-price').value = p ? (p.price||'') : '';
  document.getElementById('prop-rent').value = p ? (p.rentExpected||'') : '';
  document.getElementById('prop-market-rent').value = p ? (p.rentMarket||'') : '';
  document.getElementById('prop-repair').value = p ? (p.repairCost||'') : '';
  document.getElementById('prop-closing').value = p ? (p.closingCost||'') : '';
  document.getElementById('prop-downpayment').value = p ? (p.downPayment||'') : '';
  document.getElementById('prop-exit').value = p ? (p.exitStrategy||'') : '';
  document.getElementById('prop-exit-year').value = p ? (p.exitTargetYear||'') : '';
  document.getElementById('prop-exit-price').value = p ? (p.exitTargetPrice||'') : '';
  document.getElementById('prop-exit-reason').value = p ? (p.exitReason||'') : '';
  document.getElementById('prop-photo-url').value = p ? (p.photoAlbumUrl||'') : '';
  document.getElementById('prop-photo-memo').value = p ? (p.photoMemo||'') : '';
  document.getElementById('prop-drop-reason').value = p ? (p.dropReason||'') : '';
  document.getElementById('prop-drop-memo').value = p ? (p.dropMemo||'') : '';
  document.getElementById('prop-memo').value = p ? (p.memo||'') : '';

  toggleDropSection();
  m.classList.add('show');
}

document.getElementById('prop-status').addEventListener('change', toggleDropSection);
function toggleDropSection() {
  document.getElementById('drop-section').style.display =
    document.getElementById('prop-status').value === '見送り' ? 'block' : 'none';
}

function saveProperty(e) {
  e.preventDefault();
  const id = document.getElementById('prop-id').value;
  const isEdit = !!id;
  const p = isEdit ? data.property.find(x => String(x.id) === String(id)) : { id: genId(), timeline: [], todos: [], loans: [], cashflows: [] };

  p.date = document.getElementById('prop-date').value || today();
  p.name = document.getElementById('prop-name').value;
  p.location = document.getElementById('prop-location').value;
  p.mapUrl = document.getElementById('prop-mapurl').value;
  p.ptype = document.getElementById('prop-ptype').value;
  p.age = num(document.getElementById('prop-age').value);
  p.area = num(document.getElementById('prop-area').value);
  p.land = num(document.getElementById('prop-land').value);
  p.access = document.getElementById('prop-access').value;
  p.listingUrl = document.getElementById('prop-listingurl').value;
  p.status = document.getElementById('prop-status').value;
  p.zoning = document.getElementById('prop-zoning').value;
  p.coverage = num(document.getElementById('prop-coverage').value);
  p.far = num(document.getElementById('prop-far').value);
  p.road = document.getElementById('prop-road').value;
  p.rebuild = document.getElementById('prop-rebuild').value;
  p.legalMemo = document.getElementById('prop-legal-memo').value;
  p.price = num(document.getElementById('prop-price').value);
  p.rentExpected = num(document.getElementById('prop-rent').value);
  p.rentMarket = num(document.getElementById('prop-market-rent').value);
  p.repairCost = num(document.getElementById('prop-repair').value);
  p.closingCost = num(document.getElementById('prop-closing').value);
  p.downPayment = num(document.getElementById('prop-downpayment').value);
  p.exitStrategy = document.getElementById('prop-exit').value;
  p.exitTargetYear = num(document.getElementById('prop-exit-year').value);
  p.exitTargetPrice = num(document.getElementById('prop-exit-price').value);
  p.exitReason = document.getElementById('prop-exit-reason').value;
  p.photoAlbumUrl = document.getElementById('prop-photo-url').value;
  p.photoMemo = document.getElementById('prop-photo-memo').value;
  p.richNote = p.richNote || '';
  if (p.status === '見送り') {
    p.dropReason = document.getElementById('prop-drop-reason').value;
    p.dropMemo = document.getElementById('prop-drop-memo').value;
    p.dropDate = p.dropDate || today();
  }
  p.memo = document.getElementById('prop-memo').value;

  if (!isEdit) data.property.unshift(p);
  saveData();
  closeModal('modal-property');
  toast('物件「' + p.name + '」を保存しました');
  renderCurrentPage();
}

function renderPropertyCard(p, compact) {
  const yield_ = (p.price && p.rentExpected) ? ((p.rentExpected * 12) / (p.price * 10000) * 100).toFixed(1) : null;
  return '<div class="card" style="cursor:pointer" onclick="showPropertyDetail(\'' + p.id + '\')">' +
    '<div class="card-header"><div><div class="card-title">' + esc(p.name) + '</div>' +
    '<div class="card-sub">' + esc(p.location || '') + (p.ptype ? ' · ' + esc(p.ptype) : '') + '</div></div>' +
    statusBadge(p.status) + '</div>' +
    (compact ? '' : '<div class="card-body">' +
    (p.price ? '価格: ' + fmtNum(p.price) + '万円' : '') +
    (yield_ ? ' · 表面利回り: ' + yield_ + '%' : '') +
    (p.rentExpected ? ' · 想定家賃: ' + fmtNum(p.rentExpected) + '円/月' : '') +
    '</div>') +
    '</div>';
}

function renderPropertyList() {
  const filter = document.querySelector('#property-filter .filter-chip.active');
  const phase = filter ? filter.dataset.filter : 'all';
  const list = data.property.filter(p => phase === 'all' || STATUS_PHASE[p.status] === phase);
  document.getElementById('property-filter').innerHTML =
    ['all','取得','運用','出口','離脱'].map(f =>
      '<button class="filter-chip' + (f === (phase||'all') ? ' active' : '') + '" data-filter="' + f + '" onclick="setPropertyFilter(this)">' +
      (f === 'all' ? 'すべて' : f) + '</button>'
    ).join('');
  document.getElementById('property-list').innerHTML = list.length ?
    list.map(p => renderPropertyCard(p)).join('') :
    '<div class="empty"><div class="icon">🏢</div>物件がありません</div>';
}
function setPropertyFilter(el) {
  document.querySelectorAll('#property-filter .filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderPropertyList();
}

/* ===== PROPERTY DETAIL ===== */
function showPropertyDetail(id) {
  currentPropertyId = id;
  showPage('property-detail');
  renderPropertyDetail();
}
function editCurrentProperty() { openPropertyModal(currentPropertyId); }

function renderPropertyDetail() {
  const p = data.property.find(x => String(x.id) === String(currentPropertyId));
  if (!p) return;
  const yield_ = (p.price && p.rentExpected) ? ((p.rentExpected * 12) / (p.price * 10000) * 100).toFixed(1) : null;

  let html = '<h2 style="font-size:18px;margin-bottom:4px;">' + esc(p.name) + '</h2>' +
    '<div style="margin-bottom:12px;">' + statusBadge(p.status) + '</div>';

  html += '<div class="detail-tabs">' +
    ['Overview','Log','融資','Note'].map((t, i) =>
      '<div class="detail-tab' + (i===0?' active':'') + '" onclick="switchDetailTab(this, \'dtab-'+i+'\')">' + t + '</div>'
    ).join('') + '</div>';

  // Overview
  html += '<div class="detail-pane active" id="dtab-0">';
  const fields = [
    ['日付', p.date], ['住所', p.location], ['種別', p.ptype], ['築年数', p.age ? p.age+'年' : null],
    ['延床面積', p.area ? p.area+'㎡' : null], ['土地面積', p.land ? p.land+'㎡' : null], ['アクセス', p.access]
  ];
  fields.forEach(([l,v]) => { if(v) html += '<div class="field-row"><span class="field-label">'+l+'</span><span class="field-value">'+esc(String(v))+'</span></div>'; });

  if (p.listingUrl) html += '<div class="field-row"><span class="field-label">掲載URL</span><span class="field-value"><a href="'+esc(p.listingUrl)+'" target="_blank" style="color:var(--green)">リンク↗</a></span></div>';
  if (p.mapUrl) html += '<div class="field-row"><span class="field-label">Google Maps</span><span class="field-value"><a href="'+esc(p.mapUrl)+'" target="_blank" style="color:var(--green)">地図↗</a></span></div>';

  if (p.zoning || p.road || p.rebuild) {
    html += '<div class="form-section">📜 法的・行政</div>';
    if(p.zoning) html += '<div class="field-row"><span class="field-label">用途地域</span><span class="field-value">'+esc(p.zoning)+'</span></div>';
    if(p.coverage) html += '<div class="field-row"><span class="field-label">建ぺい率</span><span class="field-value">'+p.coverage+'%</span></div>';
    if(p.far) html += '<div class="field-row"><span class="field-label">容積率</span><span class="field-value">'+p.far+'%</span></div>';
    if(p.road) html += '<div class="field-row"><span class="field-label">接道状況</span><span class="field-value">'+esc(p.road)+'</span></div>';
    if(p.rebuild) html += '<div class="field-row"><span class="field-label">再建築</span><span class="field-value">'+esc(p.rebuild)+'</span></div>';
    if(p.legalMemo) html += '<div style="margin-top:6px;font-size:13px;color:var(--gray4)">'+esc(p.legalMemo)+'</div>';
  }

  html += '<div class="form-section">💴 収支</div>';
  const fin = [
    ['購入価格', p.price ? fmtNum(p.price)+'万円' : null],
    ['想定家賃', p.rentExpected ? fmtNum(p.rentExpected)+'円/月' : null],
    ['近隣相場', p.rentMarket ? fmtNum(p.rentMarket)+'円/月' : null],
    ['修繕費見込', p.repairCost ? fmtNum(p.repairCost)+'万円' : null],
    ['諸費用見込', p.closingCost ? fmtNum(p.closingCost)+'万円' : null],
    ['自己資金', p.downPayment ? fmtNum(p.downPayment)+'万円' : null],
    ['表面利回り', yield_ ? yield_+'%' : null],
  ];
  fin.forEach(([l,v]) => { if(v) html += '<div class="field-row"><span class="field-label">'+l+'</span><span class="field-value">'+v+'</span></div>'; });

  if (p.exitStrategy) {
    html += '<div class="form-section">🚪 出口戦略</div>';
    html += '<div class="field-row"><span class="field-label">方針</span><span class="field-value">'+esc(p.exitStrategy)+'</span></div>';
    if(p.exitTargetYear) html += '<div class="field-row"><span class="field-label">想定保有</span><span class="field-value">'+p.exitTargetYear+'年</span></div>';
    if(p.exitTargetPrice) html += '<div class="field-row"><span class="field-label">想定売却価格</span><span class="field-value">'+fmtNum(p.exitTargetPrice)+'万円</span></div>';
    if(p.exitReason) html += '<div style="margin-top:6px;font-size:13px;color:var(--gray4)">'+esc(p.exitReason)+'</div>';
  }

  if (p.photoAlbumUrl) {
    html += '<div class="form-section">📸 写真</div>';
    html += '<div class="field-row"><span class="field-label">アルバム</span><span class="field-value"><a href="'+esc(p.photoAlbumUrl)+'" target="_blank" style="color:var(--green)">開く↗</a></span></div>';
    if(p.photoMemo) html += '<div style="font-size:13px;color:var(--gray4)">'+esc(p.photoMemo)+'</div>';
  }

  if (p.status === '見送り' && p.dropReason) {
    html += '<div class="form-section">❌ 見送り</div>';
    html += '<div class="field-row"><span class="field-label">理由</span><span class="field-value">'+esc(p.dropReason)+'</span></div>';
    if(p.dropMemo) html += '<div style="font-size:13px;color:var(--gray4)">'+esc(p.dropMemo)+'</div>';
  }
  if (p.memo) html += '<div class="form-section">📝 メモ</div><div style="font-size:13px;color:var(--gray4);white-space:pre-wrap;">'+esc(p.memo)+'</div>';
  html += '</div>';

  // Log
  html += '<div class="detail-pane" id="dtab-1">';
  const logs = (p.timeline || []).slice().sort((a,b) => b.date > a.date ? 1 : -1);
  const relatedMemos = data.action.filter(m => (m.properties || []).includes(p.name) || m.property === p.name);
  const allLogs = [...logs.map(l => ({...l, src:'log'})), ...relatedMemos.map(m => ({date:m.date, text: '[Memo] ' + m.title + (m.content ? ': '+m.content : ''), src:'memo'}))].sort((a,b) => b.date > a.date ? 1 : -1);
  if (allLogs.length) {
    allLogs.forEach(l => {
      html += '<div style="padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:13px;"><span style="color:var(--gray3);margin-right:8px;">'+esc(l.date)+'</span>'+esc(l.text)+'</div>';
    });
  } else {
    html += '<div class="empty"><div class="icon">📋</div>Logがありません<br><small>Memoを物件に紐づけると自動表示されます</small></div>';
  }
  html += '</div>';

  // 融資
  html += '<div class="detail-pane" id="dtab-2">';
  html += '<button class="btn btn-primary btn-sm" onclick="openLoanModal(\'' + p.id + '\')" style="margin-bottom:12px;">+ 融資情報を追加</button>';
  const activeLoans = (p.loans||[]).filter(l => !l.archived);
  const archivedLoans = (p.loans||[]).filter(l => l.archived);
  if (activeLoans.length) {
    activeLoans.forEach(l => { html += renderLoanCard(l, p.id); });
  } else {
    html += '<div class="empty" style="padding:20px;"><div class="icon">🏦</div>融資情報がありません</div>';
  }
  if (archivedLoans.length) {
    html += '<details style="margin-top:12px;"><summary style="font-size:13px;color:var(--gray3);cursor:pointer;">過去の打診履歴（' + archivedLoans.length + '件）</summary>';
    archivedLoans.forEach(l => { html += renderLoanCard(l, p.id, true); });
    html += '</details>';
  }
  html += '</div>';

  // Note
  html += '<div class="detail-pane" id="dtab-3">';
  html += '<textarea id="prop-rich-note" rows="10" style="width:100%;min-height:200px;" placeholder="自由にメモを記入..." oninput="saveRichNote()">' + esc(p.richNote||'') + '</textarea>';
  html += '</div>';

  document.getElementById('property-detail-content').innerHTML = html;
}

function renderLoanCard(l, propId, archived) {
  const statusColor = l.status === '承認' ? 'var(--green)' : l.status === '否決' ? 'var(--red)' : 'var(--gray4)';
  let h = '<div class="card" style="' + (archived ? 'opacity:.6;' : '') + '">';
  h += '<div class="card-header"><div class="card-title">' + esc(l.bank) + '</div><span style="color:'+statusColor+';font-size:12px;font-weight:700;">'+esc(l.status)+'</span></div>';
  h += '<div class="card-body">';
  if(l.amount) h += '借入: ' + fmtNum(l.amount) + '万円 ';
  if(l.rate) h += '金利: ' + l.rate + '% ';
  if(l.years) h += '期間: ' + l.years + '年 ';
  if(l.monthly) h += '<br>月々: ' + fmtNum(l.monthly) + '円 ';
  if(l.memo) h += '<br><span style="color:var(--gray3)">'+esc(l.memo)+'</span>';
  if(l.result) h += '<br><strong>結果:</strong> '+esc(l.result);
  h += '</div>';
  h += '<div style="margin-top:8px;display:flex;gap:6px;">';
  h += '<button class="btn btn-secondary btn-sm" onclick="editLoan(\''+propId+'\',\''+l.id+'\')">✏ 編集</button>';
  if (!archived) h += '<button class="btn btn-danger btn-sm" onclick="archiveLoan(\''+propId+'\',\''+l.id+'\')">📁 アーカイブ</button>';
  else h += '<button class="btn btn-secondary btn-sm" onclick="unarchiveLoan(\''+propId+'\',\''+l.id+'\')">↩ 戻す</button>';
  h += '</div></div>';
  return h;
}

function switchDetailTab(el, paneId) {
  el.parentElement.querySelectorAll('.detail-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.detail-pane').forEach(p => p.classList.remove('active'));
  document.getElementById(paneId).classList.add('active');
}

function saveRichNote() {
  const p = data.property.find(x => String(x.id) === String(currentPropertyId));
  if (p) { p.richNote = document.getElementById('prop-rich-note').value; saveData(); }
}

/* ===== LOAN ===== */
function openLoanModal(propId, loanId) {
  document.getElementById('loan-prop-id').value = propId;
  const p = data.property.find(x => String(x.id) === String(propId));
  const l = loanId ? (p.loans||[]).find(x => String(x.id) === String(loanId)) : null;
  document.getElementById('loan-modal-title').textContent = l ? '融資情報を編集' : '融資情報を追加';
  document.getElementById('loan-id').value = l ? l.id : '';
  document.getElementById('loan-bank').value = l ? l.bank : '';
  document.getElementById('loan-amount').value = l ? (l.amount||'') : '';
  document.getElementById('loan-rate').value = l ? (l.rate||'') : '';
  document.getElementById('loan-years').value = l ? (l.years||'') : '';
  document.getElementById('loan-type').value = l ? (l.type||'元利均等') : '元利均等';
  document.getElementById('loan-monthly').value = l ? (l.monthly||'') : '';
  document.getElementById('loan-status').value = l ? (l.status||'未相談') : '未相談';
  document.getElementById('loan-memo').value = l ? (l.memo||'') : '';
  document.getElementById('loan-result').value = l ? (l.result||'') : '';
  document.getElementById('modal-loan').classList.add('show');
}
function editLoan(propId, loanId) { openLoanModal(propId, loanId); }
function saveLoan(e) {
  e.preventDefault();
  const propId = document.getElementById('loan-prop-id').value;
  const p = data.property.find(x => String(x.id) === String(propId));
  if (!p.loans) p.loans = [];
  const loanId = document.getElementById('loan-id').value;
  let l = loanId ? p.loans.find(x => String(x.id) === String(loanId)) : null;
  if (!l) { l = { id: genId(), archived: false, archivedDate: '' }; p.loans.push(l); }
  l.bank = document.getElementById('loan-bank').value;
  l.amount = num(document.getElementById('loan-amount').value);
  l.rate = num(document.getElementById('loan-rate').value);
  l.years = num(document.getElementById('loan-years').value);
  l.type = document.getElementById('loan-type').value;
  l.monthly = num(document.getElementById('loan-monthly').value);
  l.status = document.getElementById('loan-status').value;
  l.memo = document.getElementById('loan-memo').value;
  l.result = document.getElementById('loan-result').value;
  saveData();
  closeModal('modal-loan');
  toast('融資情報を保存しました');
  renderPropertyDetail();
}
function archiveLoan(propId, loanId) {
  const p = data.property.find(x => String(x.id) === String(propId));
  const l = (p.loans||[]).find(x => String(x.id) === String(loanId));
  if (l) { l.archived = true; l.archivedDate = today(); saveData(); renderPropertyDetail(); toast('アーカイブしました'); }
}
function unarchiveLoan(propId, loanId) {
  const p = data.property.find(x => String(x.id) === String(propId));
  const l = (p.loans||[]).find(x => String(x.id) === String(loanId));
  if (l) { l.archived = false; l.archivedDate = ''; saveData(); renderPropertyDetail(); toast('アーカイブを解除しました'); }
}

/* ===== MEMO ===== */
function openMemoModal(id) {
  const m = document.getElementById('modal-memo');
  document.getElementById('memo-modal-title').textContent = id ? 'Memo編集' : 'Memo追加';
  const memo = id ? data.action.find(x => String(x.id) === String(id)) : null;
  document.getElementById('memo-id').value = id || '';
  document.getElementById('memo-date').value = memo ? memo.date : today();
  document.getElementById('memo-title').value = memo ? memo.title : '';
  document.getElementById('memo-category').value = memo ? (memo.category||'') : '';
  document.getElementById('memo-content').value = memo ? (memo.content||'') : '';
  document.getElementById('memo-url').value = memo ? (memo.url||'') : '';
  document.getElementById('memo-next').value = memo ? (memo.next||'') : '';
  document.getElementById('memo-next-due').value = memo ? (memo.nextDue||'') : '';

  // Property checkboxes
  const list = document.getElementById('memo-properties-list');
  const linked = memo ? (memo.properties || (memo.property ? [memo.property] : [])) : [];
  list.innerHTML = data.property.map(p =>
    '<label><input type="checkbox" value="' + esc(p.name) + '"' + (linked.includes(p.name) ? ' checked' : '') + '> ' + esc(p.name) + '</label>'
  ).join('');
  if (!data.property.length) list.innerHTML = '<span style="font-size:12px;color:var(--gray3);">物件を先に追加してください</span>';

  m.classList.add('show');
}

function getSelectedMemoProperties() {
  return Array.from(document.querySelectorAll('#memo-properties-list input:checked')).map(c => c.value);
}

function saveMemo(e) {
  e.preventDefault();
  const id = document.getElementById('memo-id').value;
  const isEdit = !!id;
  const m = isEdit ? data.action.find(x => String(x.id) === String(id)) : { id: genId() };

  m.date = document.getElementById('memo-date').value || today();
  m.title = document.getElementById('memo-title').value;
  m.category = document.getElementById('memo-category').value;
  m.content = document.getElementById('memo-content').value;
  m.url = document.getElementById('memo-url').value;
  m.properties = getSelectedMemoProperties();
  m.property = m.properties[0] || '';
  m.next = document.getElementById('memo-next').value;
  m.nextDue = document.getElementById('memo-next-due').value;

  if (!isEdit) data.action.unshift(m);

  // Auto-add to property timeline
  if (m.properties.length && !isEdit) {
    m.properties.forEach(pname => {
      const prop = data.property.find(p => p.name === pname);
      if (prop) {
        if (!prop.timeline) prop.timeline = [];
        prop.timeline.push({ date: m.date, text: '[Memo] ' + m.title, fromMemo: true, memoId: m.id });
      }
    });
  }

  // Auto-create todo if next action
  if (m.next) {
    m.properties.forEach(pname => {
      const prop = data.property.find(p => p.name === pname);
      if (prop) {
        if (!prop.todos) prop.todos = [];
        prop.todos.push({ id: genId(), text: m.next, due: m.nextDue || '', done: false, fromMemo: m.id });
      }
    });
  }

  saveData();
  closeModal('modal-memo');
  toast('Memo「' + m.title + '」を保存しました');
  renderCurrentPage();
}

function renderMemoList() {
  const CATS = ['すべて','物件探し','現地調査','相場調査','法的確認','交渉・契約','融資','修繕・リフォーム','入居・管理','収支・税務','売却','人脈づくり','その他'];
  const filter = document.querySelector('#memo-filter .filter-chip.active');
  const cat = filter ? filter.dataset.filter : 'すべて';
  document.getElementById('memo-filter').innerHTML = CATS.map(c =>
    '<button class="filter-chip' + (c === (cat||'すべて') ? ' active' : '') + '" data-filter="' + c + '" onclick="setMemoFilter(this)">' + c + '</button>'
  ).join('');
  const list = data.action.filter(m => cat === 'すべて' || m.category === cat);
  document.getElementById('memo-list').innerHTML = list.length ?
    list.map(m =>
      '<div class="card" onclick="openMemoModal(\'' + m.id + '\')" style="cursor:pointer">' +
      '<div class="card-header"><div><div class="card-title">' + esc(m.title) + '</div>' +
      '<div class="card-sub">' + esc(m.date) + (m.category ? ' · ' + esc(m.category) : '') +
      (m.properties && m.properties.length ? ' · 📎' + m.properties.join(', ') : '') + '</div></div></div>' +
      (m.content ? '<div class="card-body" style="white-space:pre-wrap;">' + esc(m.content.substring(0, 100)) + (m.content.length > 100 ? '...' : '') + '</div>' : '') +
      (m.next ? '<div style="margin-top:6px;font-size:12px;color:var(--green);">▶ 次: ' + esc(m.next) + (m.nextDue ? ' (' + m.nextDue + ')' : '') + '</div>' : '') +
      '</div>'
    ).join('') :
    '<div class="empty"><div class="icon">📝</div>Memoがありません</div>';
}
function setMemoFilter(el) {
  document.querySelectorAll('#memo-filter .filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderMemoList();
}

/* ===== YIELD CALCULATOR ===== */
function openCalcModal() {
  document.getElementById('modal-calc').classList.add('show');
  renderCalc();
}

function renderCalc() {
  const patterns = data.calcPatterns || [];
  document.getElementById('calc-pattern-tabs').innerHTML = patterns.map((p, i) =>
    '<button class="pattern-tab' + (i === currentCalcPatternIdx ? ' active' : '') + '" onclick="currentCalcPatternIdx=' + i + ';renderCalc()">' + esc(p.name) + '</button>'
  ).join('');

  if (!patterns.length) { document.getElementById('calc-body').innerHTML = '<div class="empty">パターンを追加してください</div>'; return; }
  const pat = patterns[currentCalcPatternIdx];
  if (!pat) { currentCalcPatternIdx = 0; renderCalc(); return; }

  let html = '';

  // Income
  html += '<div class="calc-section"><h3>📈 収入</h3>';
  (pat.income || []).forEach((item, i) => {
    html += '<div class="calc-row">' +
      '<input type="text" value="' + esc(item.name) + '" onchange="pat().income['+i+'].name=this.value;saveData()">' +
      '<input type="number" value="' + (item.value||0) + '" onchange="pat().income['+i+'].value=num(this.value);saveData();calcResult()">' +
      '<select class="unit" style="width:60px" onchange="pat().income['+i+'].unit=this.value;saveData();calcResult()">' +
      ['月','年'].map(u => '<option' + (item.unit===u?' selected':'') + '>' + u + '</option>').join('') +
      '</select>' +
      '<button class="del-btn" onclick="pat().income.splice('+i+',1);saveData();renderCalc()">×</button></div>';
  });
  html += '<button class="btn btn-secondary btn-sm" onclick="pat().income.push({name:\'\',value:0,unit:\'月\'});saveData();renderCalc()">+ 項目</button></div>';

  // Vacancy
  html += '<div class="form-group" style="margin:12px 0"><label>空室損失率 (%)</label>' +
    '<input type="number" value="' + (pat.vacancyRate||0) + '" onchange="pat().vacancyRate=num(this.value);saveData();calcResult()" style="width:100px"></div>';

  // Acquisition cost
  html += '<div class="calc-section"><h3>🏷 取得費用（一時）</h3>';
  (pat.acquisition || []).forEach((item, i) => {
    html += '<div class="calc-row">' +
      '<input type="text" value="' + esc(item.name) + '" onchange="pat().acquisition['+i+'].name=this.value;saveData()">' +
      '<input type="number" value="' + (item.value||0) + '" onchange="pat().acquisition['+i+'].value=num(this.value);saveData();calcResult()">' +
      '<span class="unit">円</span>' +
      '<button class="del-btn" onclick="pat().acquisition.splice('+i+',1);saveData();renderCalc()">×</button></div>';
  });
  html += '<button class="btn btn-secondary btn-sm" onclick="pat().acquisition.push({name:\'\',value:0,unit:\'一時\'});saveData();renderCalc()">+ 項目</button></div>';

  // Running cost
  html += '<div class="calc-section"><h3>🔄 ランニングコスト</h3>';
  (pat.running || []).forEach((item, i) => {
    html += '<div class="calc-row">' +
      '<input type="text" value="' + esc(item.name) + '" onchange="pat().running['+i+'].name=this.value;saveData()">' +
      '<input type="number" value="' + (item.value||0) + '" onchange="pat().running['+i+'].value=num(this.value);saveData();calcResult()">' +
      '<select class="unit" style="width:60px" onchange="pat().running['+i+'].unit=this.value;saveData();calcResult()">' +
      ['月','年'].map(u => '<option' + (item.unit===u?' selected':'') + '>' + u + '</option>').join('') +
      '</select>' +
      '<button class="del-btn" onclick="pat().running.splice('+i+',1);saveData();renderCalc()">×</button></div>';
  });
  html += '<button class="btn btn-secondary btn-sm" onclick="pat().running.push({name:\'\',value:0,unit:\'月\'});saveData();renderCalc()">+ 項目</button></div>';

  // Result
  html += '<div class="calc-result" id="calc-result-area"></div>';
  document.getElementById('calc-body').innerHTML = html;
  calcResult();
}

function pat() { return data.calcPatterns[currentCalcPatternIdx]; }

function calcResult() {
  const p = pat();
  if (!p) return;
  const annualIncome = (p.income||[]).reduce((s, i) => s + (i.unit === '月' ? (i.value||0)*12 : (i.value||0)), 0);
  const vacancyLoss = annualIncome * ((p.vacancyRate||0) / 100);
  const effectiveIncome = annualIncome - vacancyLoss;
  const totalAcquisition = (p.acquisition||[]).reduce((s, i) => s + (i.value||0), 0);
  const annualRunning = (p.running||[]).reduce((s, i) => s + (i.unit === '月' ? (i.value||0)*12 : (i.value||0)), 0);
  const noi = effectiveIncome - annualRunning;
  const grossYield = totalAcquisition > 0 ? (annualIncome / totalAcquisition * 100) : 0;
  const netYield = totalAcquisition > 0 ? (noi / totalAcquisition * 100) : 0;
  const monthlyCF = Math.round(noi / 12);

  const el = document.getElementById('calc-result-area');
  if (el) {
    el.innerHTML = '<div class="big">実質利回り ' + netYield.toFixed(2) + '%</div>' +
      '<div class="sub">表面利回り: ' + grossYield.toFixed(2) + '%</div>' +
      '<div class="sub">年間収入: ' + fmtNum(annualIncome) + '円（空室損失 -' + fmtNum(Math.round(vacancyLoss)) + '円）</div>' +
      '<div class="sub">年間支出: ' + fmtNum(annualRunning) + '円</div>' +
      '<div class="sub">年間NOI: ' + fmtNum(noi) + '円</div>' +
      '<div class="sub">月間キャッシュフロー: ' + fmtNum(monthlyCF) + '円</div>' +
      '<div class="sub">取得費用合計: ' + fmtNum(totalAcquisition) + '円</div>';
  }
}

function addPattern() {
  const name = prompt('パターン名を入力:', 'パターン' + String.fromCharCode(65 + data.calcPatterns.length));
  if (!name) return;
  data.calcPatterns.push({ id: genId(), name, income: [{ name: '家賃収入', value: 0, unit: '月' }], acquisition: [{ name: '物件価格', value: 0, unit: '一時' }], running: [], vacancyRate: 10 });
  currentCalcPatternIdx = data.calcPatterns.length - 1;
  saveData(); renderCalc();
}
function renamePattern() {
  const p = pat(); if (!p) return;
  const name = prompt('新しいパターン名:', p.name);
  if (name) { p.name = name; saveData(); renderCalc(); }
}
function deletePattern() {
  if (!pat() || !confirm(pat().name + ' を削除しますか？')) return;
  data.calcPatterns.splice(currentCalcPatternIdx, 1);
  currentCalcPatternIdx = Math.max(0, currentCalcPatternIdx - 1);
  saveData(); renderCalc();
}

/* ===== HOME ===== */
function renderHome() {
  document.getElementById('home-property-list').innerHTML =
    data.property.length ?
    data.property.slice(0, 5).map(p => renderPropertyCard(p, true)).join('') :
    '<div class="empty" style="padding:20px;"><div class="icon">🏢</div>物件を追加してみましょう</div>';
  document.getElementById('home-memo-list').innerHTML =
    data.action.length ?
    data.action.slice(0, 5).map(m =>
      '<div class="card" onclick="openMemoModal(\'' + m.id + '\')" style="cursor:pointer"><div class="card-header"><div><div class="card-title" style="font-size:13px;">' + esc(m.title) + '</div><div class="card-sub">' + esc(m.date) + (m.category ? ' · '+esc(m.category) : '') + '</div></div></div></div>'
    ).join('') :
    '<div class="empty" style="padding:20px;"><div class="icon">📝</div>Memoを追加してみましょう</div>';
}

/* ===== MODAL HELPERS ===== */
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
function renderCurrentPage() {
  const active = document.querySelector('.page.active');
  if (!active) return;
  const id = active.id.replace('page-', '');
  if (id === 'home') renderHome();
  else if (id === 'property') renderPropertyList();
  else if (id === 'property-detail') renderPropertyDetail();
  else if (id === 'memo') renderMemoList();
}

// Close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(ov => {
  ov.addEventListener('click', e => { if (e.target === ov) ov.classList.remove('show'); });
});

/* ===== INIT ===== */
loadData();
renderHome();
</script>
